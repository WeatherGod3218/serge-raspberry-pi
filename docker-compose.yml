---

services:
  serge-raspberry-pi:
    build: .
    container_name: Serge-Raspberry-Pi
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/src/data
    stop_grace_period: 30s
    networks:
      - serge-external-network
    # devices:
    #   - /dev/i2c-1:/dev/i2c-1
    # environment:
    #   - BLINKA_RASPBERRY_PI=1

networks:
  serge-external-network:
    external: true
